version: '3.8'

services:
  database:
    image: mysql:8.0
    container_name: citylunch_db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: citylunch
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql

  redis:
    image: redis:7-alpine
    container_name: citylunch_redis
    restart: always
    ports:
      - "6379:6379"

  php:
    build: .
    container_name: citylunch_app
    volumes:
      - .:/var/www/html
    depends_on:
      - database
      - redis

  nginx:
    image: nginx:alpine
    container_name: citylunch_nginx
    ports:
      - "8000:80"
    volumes:
      - .:/var/www/html
      - ./docker/nginx.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - php

volumes:
  db_data: