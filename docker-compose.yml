version: '3.8'

services:
  database:
    image: mysql:8.0
    container_name: citylunch_db
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: citylunch
    ports:
      - "3306:3306"

  nosql_session:
    image: redis:7-alpine
    container_name: citylunch_redis
    ports:
      - "6379:6379"

  php:
    build: .
    container_name: citylunch_app
    volumes:
      - .:/var/www/html
